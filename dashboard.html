<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K1 Dashboard - Records</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .records-table th, .records-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .records-table th {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .records-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-paid { background: #10b98122; color: #10b981; border: 1px solid #10b98144; }
        .status-pending { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .search-bar {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            color: var(--text-primary);
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem;">K1 Slip Records</h1>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">View and manage all generated slips stored in Firebase.</p>
            </div>
            <div class="header-actions">
                <input type="text" id="search-input" class="search-bar" placeholder="Search by Client or ID...">
                <a href="index.html" class="btn-primary" style="text-decoration: none;">+ New Slip</a>
            </div>
        </header>

        <div id="loading" class="loading-spinner">Loading records from Firestore...</div>
        
        <div class="table-wrapper" style="overflow-x: auto;">
            <table class="records-table" id="records-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Slip ID</th>
                        <th>Client</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="records-list">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
