<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K1 Dashboard - Records</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .records-table th, .records-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .records-table th {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .records-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-paid { background: #10b98122; color: #10b981; border: 1px solid #10b98144; }
        .status-pending { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .search-bar {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 0.6rem 1rem;
            border-radius: 6px;
            color: var(--text-primary);
            width: 300px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1 style="font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; letter-spacing: -0.5px;">K1 Slip Records</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem;">Cloud-synced database for high-performance management.</p>
            </div>
            <div class="header-actions">
                <input type="text" id="search-input" class="search-bar" placeholder="Quick search..." style="width: 250px;">
                <div style="display: flex; gap: 1rem;">
                    <a href="index.html" class="btn-secondary" style="text-decoration: none; padding: 0.8rem 1.5rem;">← Home</a>
                    <a href="index.html" class="btn-primary" style="text-decoration: none; padding: 0.8rem 1.5rem;">+ Create New</a>
                </div>
            </div>
        </header>

        <div id="loading" class="loading-spinner">
            <div style="margin-bottom: 1rem;">Fetching encrypted records...</div>
            <div style="width: 40px; height: 40px; border: 3px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        </div>
        
        <style>
            @keyframes spin { to { transform: rotate(360deg); } }
            .dashboard-container {
                max-width: 1300px;
                margin: 4rem auto;
                background: var(--glass-bg);
                backdrop-filter: blur(20px);
                border-radius: 32px;
                padding: 3.5rem;
                border: 1px solid var(--glass-border);
                box-shadow: var(--shadow-premium);
                animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            }
            @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
            
            .records-table {
                width: 100%;
                border-collapse: separate;
                border-spacing: 0 0.75rem;
                margin-top: 2rem;
            }
            .records-table th {
                padding: 1rem 1.5rem;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 1.5px;
                color: var(--text-muted);
                border: none;
            }
            .records-table tbody tr {
                background: rgba(255, 255, 255, 0.02);
                transition: var(--transition);
                border-radius: 12px;
            }
            .records-table tbody tr td {
                padding: 1.25rem 1.5rem;
                border-top: 1px solid rgba(255, 255, 255, 0.03);
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            }
            .records-table tbody tr td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.03); border-radius: 12px 0 0 12px; }
            .records-table tbody tr td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.03); border-radius: 0 12px 12px 0; }
            
            .records-table tbody tr:hover {
                background: rgba(255, 255, 255, 0.06);
                transform: scale(1.01) translateY(-2px);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            }
        </style>

        <div class="table-wrapper" style="overflow-x: auto;">
            <table class="records-table" id="records-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Slip ID</th>
                        <th>Client</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="records-list">
                    <!-- Data injected by dashboard.js -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Content will be injected here -->
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="print-modal-btn">Print Slip</button>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
